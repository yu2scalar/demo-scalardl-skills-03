spring.application.name=demo-scalardl-app

# springdoc-openapi (Swagger UI) — http://localhost:8080/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs

# ScalarDL — server endpoint
scalardl.server-host=scalardl-ledger-envoy
scalardl.server-port=50051
scalardl.server-privileged-port=50052

# ScalarDL — client identity
scalardl.cert-holder-id=client
scalardl.cert-version=1
scalardl.cert-path=./cert/client.scalar.local.cert
scalardl.private-key-path=./cert/client.scalar.local.key

#scalar.dl.client.entity.id=changeme
#scalardl.cert-holder-id=changeme
#scalardl.cert-version=1
#scalardl.cert-path=./cert/changeme.scalar.local.cert
#scalardl.private-key-path=./cert/changeme.scalar.local.key

# ScalarDL — TLS (off by default for local docker-compose; enable in production)
scalardl.tls-enabled=false

# ScalarDL — Auditor (disabled by default; flip to true and fill the host when running in Auditor mode)
scalardl.auditor.enabled=true
scalardl.auditor.host=scalardl-audit-envoy
scalardl.auditor.port=40051
scalardl.auditor.privileged-port=40052
scalardl.auditor.tls-enabled=false
scalardl.auditor.linearizable-validation-contract-id=validate-ledger

# Optional: HMAC authentication (alternative to PKI). Uncomment + fill to use.
#scalar.dl.client.authentication.method=hmac
#scalar.dl.client.entity.identity.hmac.secret_key_version=1
#scalar.dl.client.entity.identity.hmac.secret_key=<base64-encoded-secret>

# File upload limits (for /api/generator/contract|function definition uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
